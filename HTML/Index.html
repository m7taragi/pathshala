<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Create Account | Modern Login</title>
    <meta name="description" content="Create your account with our modern, secure and responsive login page.">

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Create Account | Modern Login">
    <meta property="og:description" content="Sign up with a modern, responsive and secure login form.">
    <meta property="og:image" content="https://m7taragi.github.io/public/images/Signup.jpg">
    <meta property="og:url" content="https://yourdomain.com/">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Create Account | Modern Login">
    <meta name="twitter:description" content="Sign up with a modern, responsive and secure login form.">
    <meta name="twitter:image" content="https://yourdomain.com/preview.jpg">

    <!-- Favicon (optional) -->
    <link rel="icon" href="./favicon.ico" type="image/x-icon">

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">
        <form id="loginForm" novalidate>
            <h2>Create Account</h2>

            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your name">
                <small class="error" id="nameError"></small>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email">
                <small class="error" id="emailError"></small>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
                <small class="error" id="passwordError"></small>
            </div>

            <button type="submit">Sign Up</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
